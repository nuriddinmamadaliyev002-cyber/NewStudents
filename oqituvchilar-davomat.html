<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>InnovateIT School — O'qituvchilar Davomati</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/oqituvchilar-davomat.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">InnovateIT School · O'qituvchilar Davomati</div>
  <div class="topbar-right">
    <span class="admin-badge" id="dav-badge"></span>
    <button class="btn-logout" onclick="goBack()">← Orqaga</button>
    <button class="btn-davomat" id="btn-save" onclick="confirmSave()">💾 Saqlash</button>
  </div>
</div>

<!-- DATE BAR -->
<div class="date-bar">
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)">‹</button>
    <div style="text-align:center;">
      <div class="date-display" id="date-display">—</div>
      <div class="date-sub"    id="date-sub">—</div>
    </div>
    <button class="date-nav-btn" id="btn-next" onclick="changeDate(1)">›</button>
  </div>
  <input class="date-input" type="date" id="date-picker" onchange="onDatePick()">
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-pill"><span class="stat-dot keldi"></span>Keldi <span class="stat-num" id="st-keldi">0</span></div>
  <div class="stat-pill"><span class="stat-dot kelmadi"></span>Kelmadi <span class="stat-num" id="st-kelmadi">0</span></div>
  <div class="stat-pill"><span class="stat-dot sababli"></span>Sababli <span class="stat-num" id="st-sababli">0</span></div>
  <div class="stat-pill"><span class="stat-dot kech"></span>Kech <span class="stat-num" id="st-kech">0</span></div>
  <div class="stat-pill" style="margin-left:auto;">Jami: <span class="stat-num" id="st-total">0</span></div>
</div>

<!-- ASOSIY -->
<div class="dav-main">
  <div class="teacher-list" id="teacher-list">
    <div class="empty-state"><div class="empty-state-icon">👩‍🏫</div><p>O'qituvchilar yuklanmoqda…</p></div>
  </div>
</div>

<!-- MODAL: Sababli izoh -->
<div class="modal-overlay" id="izoh-modal" onclick="if(event.target===this)closeIzoh()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">📋 Sababli — izoh kiriting</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">Sabab (ixtiyoriy):</p>
    <textarea id="izoh-input" class="field-input"
      placeholder="Masalan: Kasalligi sababli…"
      style="resize:none;height:80px;margin-bottom:4px;display:block;font-size:14px;"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();confirmIzoh();}"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeIzoh()">Bekor</button>
      <button class="btn-submit" onclick="confirmIzoh()">Tasdiqlash</button>
    </div>
  </div>
</div>

<!-- MODAL: Saqlash tasdiq -->
<div class="modal-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" style="text-align:center;">💾 Davomatni saqlash</div>
    <p class="modal-sub" id="confirm-desc" style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:14px;"></p>
    <div class="dav-modal-stats">
      <div class="dav-modal-stat k"><span class="num" id="c-keldi">0</span>✅ Keldi</div>
      <div class="dav-modal-stat x"><span class="num" id="c-kelmadi">0</span>❌ Kelmadi</div>
      <div class="dav-modal-stat s"><span class="num" id="c-sababli">0</span>📋 Sababli</div>
      <div class="dav-modal-stat l"><span class="num" id="c-kech">0</span>⏰ Kech</div>
    </div>
    <p id="confirm-warn" style="font-size:12px;color:var(--danger);text-align:center;margin-bottom:12px;display:none;"></p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeConfirm()">Yo'q, bekor</button>
      <button class="btn-submit" id="btn-confirm" onclick="doSave()">
        <span class="spinner" id="save-spinner"></span>
        <span id="save-txt">Ha, saqlash</span>
      </button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading-ov"><div class="loading-spinner"></div></div>
<div class="toast" id="toast"></div>

<script src="js/oqituvchilar-davomat.js"></script>
</body>
</html>
