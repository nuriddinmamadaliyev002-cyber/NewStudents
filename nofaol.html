<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>InnovateIT School — Nofaol O'quvchilar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Nofaol badge ── */
    .badge-nofaol {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: #fff5f5;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .badge-chiqgan {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
    }
    .btn-faollashtir {
      padding: 6px 12px;
      font-size: 12px;
      border: 1.5px solid #16a34a;
      border-radius: 8px;
      cursor: pointer;
      background: #f0fdf4;
      color: #15803d;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .btn-faollashtir:active { background: #bbf7d0; }

    /* ── topbar stat badge ── */
    .nofaol-count {
      font-size: 11px; color: #dc2626;
      background: #fff5f5; border: 1px solid #fecaca;
      padding: 3px 8px; border-radius: 20px;
      font-family: 'DM Mono', monospace; white-space: nowrap; flex-shrink: 0;
    }

    /* ── Faollashtirish modal confirm area ── */
    .confirm-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .confirm-box-name {
      font-weight: 600;
      font-size: 15px;
      color: #15803d;
      margin-bottom: 6px;
    }
    .confirm-box-desc {
      font-size: 13px;
      color: #7a7870;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">InnovateIT School · Nofaol O'quvchilar</div>
  <div class="topbar-right">
    <span class="admin-badge" id="nofaol-badge"></span>
    <span class="nofaol-count" id="nofaol-count">0</span>
    <button class="btn-logout" onclick="goBack()">← Orqaga</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" style="padding-top:16px;">

  <!-- Filter / search -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">🚫 Nofaol o'quvchilar ro'yxati</div>
      <div class="filters">
        <input class="search-input" id="f-search" placeholder="🔍  Ism, telefon…" oninput="applyFilters()">
        <select class="filter-sel" id="f-maktab-f" onchange="applyFilters()">
          <option value="">Barcha maktab</option>
        </select>
        <select class="filter-sel" id="f-sinf-f" onchange="applyFilters()">
          <option value="">Barcha sinf</option>
          <option>1-sinf</option><option>2-sinf</option><option>3-sinf</option>
          <option>4-sinf</option><option>5-sinf</option><option>6-sinf</option>
          <option>7-sinf</option><option>8-sinf</option><option>9-sinf</option>
        </select>
      </div>
    </div>

    <!-- Desktop jadval -->
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Ism Familiya</th><th>Maktab</th><th>Sinf</th>
          <th>Telefon</th><th>Tug'ilgan</th>
          <th>Boshlagan</th><th>Chiqgan</th>
          <th id="admin-col-n" style="display:none;">Admin</th>
          <th>Amal</th>
        </tr></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>

    <!-- Mobil kartalar -->
    <div id="mob-cards" class="mobile-list"></div>
  </div>

</div><!-- /main -->

<!-- MODAL: Faollashtirish tasdiqi -->
<div class="modal-overlay" id="faol-modal" onclick="if(event.target===this)closeFaolModal()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">✅ O'quvchini faollashtirish</div>

    <div class="confirm-box">
      <div class="confirm-box-name" id="faol-name-display">—</div>
      <div class="confirm-box-desc">Bu o'quvchi nofaol ro'yxatdan olib, yana faol o'quvchilar ro'yxatiga qo'shiladi.</div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeFaolModal()">Bekor qilish</button>
      <button class="btn-submit" id="faol-confirm-btn"
        style="background:#16a34a;" onclick="confirmFaollashtir()">
        <span class="spinner" id="faol-spinner"></span>
        <span id="faol-btn-txt">Ha, faollashtirish</span>
      </button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading-ov"><div class="loading-spinner"></div></div>
<div class="toast" id="toast"></div>

<script src="js/nofaol.js"></script>
</body>
</html>
